- name: Ensure acl package is installed
  become: yes
  apt:
    name: acl
    state: present
    update_cache: yes

- name: make ipfs group
  become: yes
  group:
    state: present
    name: ipfs

- name: make ipfs user
  become: yes
  user:
    state: present
    name: ipfs
    group: ipfs
    shell: /bin/false
    home: "{{ ipfs_home }}" # /var/lib/ipfs
    create_home: no         
    comment: IPFS user
    system: yes

- name: create ipfs data directory
  become: yes
  file:
    state: directory
    owner: ipfs
    group: ipfs
    mode: "0750"
    dest: "{{ ipfs_home }}/.ipfs"

- name: create download folder for kubo
  become: yes
  file:
    state: directory
    owner: root
    group: root
    mode: 0755
    dest: /opt/kubo/{{ ipfs_version }}
